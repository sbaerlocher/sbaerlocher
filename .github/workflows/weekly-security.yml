name: Weekly Security

on:
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  config:
    permissions:
      contents: read
      security-events: write
    uses: sbaerlocher/.github/.github/workflows/security-config.yml@2026-07-21
    secrets: inherit

  secrets:
    permissions:
      contents: read
      actions: read
      pull-requests: read
    uses: sbaerlocher/.github/.github/workflows/security-secrets.yml@2026-07-21
    secrets: inherit
